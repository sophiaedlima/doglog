# ===== CONFIGURAÇÕES DO DOGLOG BACKEND =====

spring.application.name=doglog

# Banco de dados PostgreSQL
# Certifique-se de que o PostgreSQL está rodando
# e que o banco doglog_db foi criado
spring.datasource.url=jdbc:postgresql://localhost:5432/doglog_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA: update cria/atualiza as tabelas automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT: segredo e tempo de expiração (24 horas em ms)
app.jwt.secret=doglog-chave-secreta-super-longa-para-jwt-512bits-2026
app.jwt.expiration=86400000

# Porta do servidor
server.port=8080